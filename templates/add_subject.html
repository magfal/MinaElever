{% extends "base.html" %}

{% block title %}Skapa grupp{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card p-4 shadow-sm border-primary">
            <h2 class="text-primary mb-3">Skapa nytt ämne</h2>
            <form method="POST">
                <div class="mb-3">
                    <label class="form-label fw-bold">Ämne</label>
                    <input type="text" name="name" class="form-control form-control-lg" placeholder="Namn..." required autofocus>
                </div>
                
                <div class="d-grid">
                    <button type="submit" class="btn btn-primary btn-lg">Spara ämne</button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
