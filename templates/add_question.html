{% extends "base.html" %}

{% block content %}
<div class="container mt-4">
    <div class="card shadow-sm">
        <div class="card-header bg-dark text-white">
            <h4 class="mb-0">Skapa ny fråga</h4>
        </div>
        <div class="card-body">
            <form method="POST">
                <div class="mb-3">
                    <label class="form-label fw-bold">Frågeformulering (Prompt)</label>
                    <textarea name="prompt" class="form-control" rows="3" required></textarea>
                </div>

                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label fw-bold">Ämne</label>
                        <select name="subject_id" class="form-select" required>
                            <option value="" disabled selected>Välj ämne...</option>
                            {% for s in subjects %}
                                <option value="{{ s.id }}">{{ s.name }}</option>
                            {% endfor %}
                        </select>
                    </div>

                    <div class="col-md-6 mb-3">
                        <label class="form-label fw-bold">Typ av fråga</label>
                        <select name="question_type" class="form-select" required>
                            {% for type in QuestionType %}
                                <option value="{{ type.name }}">{{ type.value.capitalize() }}</option>
                            {% endfor %}
                        </select>
                    </div>
                </div>

                <div class="mt-3">
                    <button type="submit" class="btn btn-primary">Spara fråga i biblioteket</button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
