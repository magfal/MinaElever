{% extends "base.html" %}
{% block content %}

<h2 class="mb-4">Frågor</h2>

<link rel="stylesheet"
      href="https://cdn.datatables.net/1.13.6/css/jquery.dataTables.min.css">

<table id="questionsTable" class="table table-striped table-bordered align-middle">
    <thead class="table-dark">
        <tr>
            <th>Fråga</th>
            <th>Ämne</th>
            <th>Taggar</th>
            <th>Typ</th>
            <th>Skapad</th>
            <th>Assign</th>
        </tr>
    </thead>

    <tbody>
        {% for q in questions %}
        <tr>

            <!-- PROMPT -->
            <td contenteditable="true"
                class="editable"
                data-id="{{ q.id }}"
                data-field="prompt">
                {{ q.prompt }}
            </td>

            <!-- SUBJECT -->
            <td>
                <select class="form-select form-select-sm editable-select"
                        data-id="{{ q.id }}"
                        data-field="subject_id">
                    {% for s in subjects %}
                        <option value="{{ s.id }}"
                                {% if s.id == q.subject_id %}selected{% endif %}>
                            {{ s.name }}
                        </option>
                    {% endfor %}
                </select>
            </td>

            <!-- TAGGAR -->
            <td style="position: relative;">
                <input type="text"
                       class="form-control form-control-sm tag-input editable-tags"
                       data-id="{{ q.id }}"
                       value="{{ q.tags | map(attribute='name') | join(', ') }}">
                <div class="autocomplete-box" style="display:none;"></div>
            </td>

            <!-- QUESTION TYPE -->
            <td>
                <select class="form-select form-select-sm editable-select"
                        data-id="{{ q.id }}"
                        data-field="question_type">
                    {% for qt in question_types %}
                        <option value="{{ qt.name }}"
                                {% if qt == q.question_type %}selected{% endif %}>
                            {{ qt.name }}
                        </option>
                    {% endfor %}
                </select>
            </td>

            <td>{{ q.created_at.strftime('%Y-%m-%d %H:%M') }}</td>

            <!-- ASSIGN -->
            <td>
                <a href="{{ url_for('add_assignment', question_id=q.id) }}"
                   class="btn btn-sm btn-primary">
                    Assign
                </a>
            </td>

        </tr>
        {% endfor %}
    </tbody>
</table>

<hr>

<a href="{{ url_for('add_assignment') }}" class="btn btn-secondary">
    Skapa ny assignment
</a>

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>

<script>
$(document).ready(function() {
    $('#questionsTable').DataTable({
        pageLength: 25,
        order: [[4, "desc"]],
        language: {
            search: "Sök:",
            lengthMenu: "Visa _MENU_ rader",
            info: "Visar _START_ till _END_ av _TOTAL_ frågor",
            paginate: { next: "Nästa", previous: "Föregående" }
        }
    });
});

// INLINE TEXT EDIT
$(document).on("blur", ".editable", function () {
    const id = $(this).data("id");
    const field = $(this).data("field");
    const value = $(this).text().trim();

    fetch("/admin/update_question", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ id, field, value })
    });
});

// INLINE SELECT EDIT
$(document).on("change", ".editable-select", function () {
    const id = $(this).data("id");
    const field = $(this).data("field");
    const value = $(this).val();

    fetch("/admin/update_question", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ id, field, value })
    });
});

// TAG AUTOCOMPLETE
$(document).on("input", ".editable-tags", function () {
    const input = $(this);
    const box = input.siblings(".autocomplete-box");
    const query = input.val();

    fetch(`/admin/tag_suggest?text=${encodeURIComponent(query)}`)
        .then(res => res.json())
        .then(tags => {
            box.empty().show();
            tags.forEach(t => {
                box.append(`<div class="autocomplete-item">${t}</div>`);
            });
        });
});

// CLICK AUTOCOMPLETE
$(document).on("click", ".autocomplete-item", function () {
    const item = $(this);
    const box = item.parent();
    const input = box.siblings(".editable-tags");

    let current = input.val().split(",").map(s => s.trim()).filter(s => s);
    current.push(item.text());
    input.val(current.join(", "));

    box.hide();

    fetch("/admin/update_tags", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
            id: input.data("id"),
            tags: input.val()
        })
    });
});
</script>

{% endblock %}
