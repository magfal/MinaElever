{% extends "base.html" %}

{% block title %}Startsida{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card p-4 shadow-sm">
            <h2 class="mb-4 text-primary">Lägg till ny elev</h2>
            
            <form method="POST">
                <div class="mb-3">
                    <label class="form-label">Namn</label>
                    <input type="text" name="name" class="form-control" placeholder="T.ex. Anna Andersson" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Inloggningskod</label>
                    <input type="text" name="login_code" class="form-control" placeholder="Unik kod" required>
                    <div class="form-text">Denna kod använder eleven för att logga in.</div>
                </div>

                <div class="mb-3">
                    <label class="form-label">Klass</label>
                    <select name="class_id" class="form-select" required>
                        <option value="">Välj klass...</option>
                        {% for c in classes %}
                        <option value="{{ c.id }}">{{ c.name }}</option>
                        {% endfor %}
                    </select>
                </div>

                <button type="submit" class="btn btn-primary w-100">Spara elev</button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
